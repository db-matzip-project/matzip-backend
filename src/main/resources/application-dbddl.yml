spring:
  config:
    activate:
      on-profile: dbddl
  sql:
    init:
      mode: never
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/matzip_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
