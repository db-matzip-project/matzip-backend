spring:
  datasource:
    # localhost:5432의 matzip_db 창고로 연결합니다.
    url: jdbc:postgresql://localhost:5432/matzip_db
    username: yunseyun               # 🚨 꼭 본인 맥북 아이디(예: kangjooyoung 등)로 적으세요!
    password:                                      # 🚨 비워두세요! (글자 다 지우고 콜론 뒤에 한 칸 공백만 두기)
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update                               # 자바 코드로 테이블을 만들면 DB에 자동으로 반영해 줍니다.
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # 위치 검색: PostGIS + latitude/longitude 컬럼 (네이티브 쿼리 ST_MakePoint)
        # DB: CREATE EXTENSION IF NOT EXISTS postgis;
        # 인덱스: src/main/resources/db/dev-postgis.sql

# 카카오 개발자 콘솔의 REST API 키 (커밋 금지 — 환경변수 권장)
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}
